configuration:
  export_name_prefix:
    name: Export-Namenspräfix
    description: Präfix für das erzeugte Exportverzeichnis und Archiv.
  include_current_state_snapshot:
    name: Aktuellen State-Snapshot exportieren
    description: Exportiert aktuelle Zustände über die interne Home-Assistant-API.
  include_service_catalog:
    name: Service-Katalog exportieren
    description: Exportiert verfügbare Services gruppiert nach Domain.
  include_dashboards:
    name: Dashboards exportieren
    description: Exportiert Lovelace-YAML und relevante Dashboard-Dateien aus .storage.
  include_blueprints:
    name: Blueprints exportieren
    description: Exportiert Dateien aus /config/blueprints.
  include_custom_components:
    name: Custom Components exportieren
    description: Exportiert Dateien aus /config/custom_components.
  include_python_scripts:
    name: python_scripts exportieren
    description: Exportiert Dateien aus /config/python_scripts.
  include_pyscript:
    name: pyscript exportieren
    description: Exportiert Dateien aus /config/pyscript, falls vorhanden.
  include_logs:
    name: Log-Tail exportieren
    description: Exportiert ein sanitisiertes Tail von home-assistant.log.
  max_log_lines:
    name: Maximale Log-Zeilen
    description: Anzahl der Log-Zeilen, die im Export erhalten bleiben.
  include_recorder_summary:
    name: Recorder-Zusammenfassung exportieren
    description: Exportiert eine zusammengefasste Recorder-Analyse statt der vollständigen DB.
  recorder_days:
    name: Recorder-Tage
    description: Anzahl der letzten Tage, die aus dem Recorder zusammengefasst werden.
  include_raw_storage_files:
    name: Raw-.storage-Dateien exportieren
    description: Exportiert ausgewählte sanitierte .storage-Dateien zusätzlich zu den normalisierten JSON-Dateien.
