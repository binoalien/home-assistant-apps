configuration:
  export_name_prefix:
    name: Export name prefix
    description: Prefix for the generated export folder and archive.
  include_current_state_snapshot:
    name: Include current state snapshot
    description: Export current states from the internal Home Assistant API.
  include_service_catalog:
    name: Include service catalog
    description: Export available services grouped by domain.
  include_dashboards:
    name: Include dashboards
    description: Export Lovelace YAML and relevant .storage dashboard files.
  include_blueprints:
    name: Include blueprints
    description: Export files from /config/blueprints.
  include_custom_components:
    name: Include custom components
    description: Export files from /config/custom_components.
  include_python_scripts:
    name: Include python_scripts
    description: Export files from /config/python_scripts.
  include_pyscript:
    name: Include pyscript
    description: Export files from /config/pyscript if present.
  include_logs:
    name: Include log tail
    description: Export a sanitized tail of home-assistant.log.
  max_log_lines:
    name: Maximum log lines
    description: Number of log lines to keep in the export.
  include_recorder_summary:
    name: Include recorder summary
    description: Export a summarized recorder analysis instead of the full DB.
  recorder_days:
    name: Recorder days
    description: Number of recent days to summarize from recorder.
  include_raw_storage_files:
    name: Include raw .storage files
    description: Export selected sanitized .storage files in addition to normalized JSON.
